<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فوق بصمة — معاينة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* Outer glow ring */
    .screen-frame {
      width: 100%;
      max-width: 1280px;
      height: calc(100vh - 48px);
      min-height: 600px;
      border-radius: 20px;
      padding: 8px;
      position: relative;
      background: linear-gradient(135deg, #4A2C3F, #2D1B2E, #1a1a2e);
      box-shadow:
        0 0 0 1px rgba(212, 168, 83, 0.15),
        0 0 60px rgba(212, 168, 83, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.7),
        inset 0 0 80px rgba(0, 0, 0, 0.3);
    }

    .screen-inner {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    .screen-inner iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Top bar decoration */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: linear-gradient(180deg, rgba(45,27,46,0.85) 0%, rgba(45,27,46,0.4) 70%, transparent 100%);
      pointer-events: none;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .top-dot:nth-child(1) { background: #C8557A; }
    .top-dot:nth-child(2) { background: #D4A853; }
    .top-dot:nth-child(3) { background: #6B8E6B; }

    .top-bar-title {
      font-family: 'Amiri', serif;
      color: rgba(255,248,245,0.6);
      font-size: 13px;
      letter-spacing: 2px;
    }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,248,245,0.3);
      font-size: 11px;
    }

    /* Bottom corner decorations */
    .corner {
      position: absolute;
      z-index: 5;
      width: 60px;
      height: 60px;
      border-color: rgba(212,168,83,0.15);
      border-style: solid;
    }
    .corner-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; border-radius: 8px 0 0 0; }
    .corner-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; border-radius: 0 0 0 8px; }
    .corner-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; border-radius: 0 0 8px 0; }

    /* Side label */
    .side-label {
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-family: 'Cairo', sans-serif;
      font-size: 11px;
      color: rgba(212,168,83,0.2);
      letter-spacing: 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .screen-frame {
        height: calc(100vh - 24px);
        min-height: 500px;
        padding: 5px;
        border-radius: 14px;
      }
      .screen-inner { border-radius: 10px; }
      .top-bar { height: 36px; padding: 0 14px; }
      .top-bar-title { font-size: 11px; }
      .corner { width: 30px; height: 30px; }
      .corner-tl { top: 10px; left: 10px; }
      .corner-tr { top: 10px; right: 10px; }
      .corner-bl { bottom: 10px; left: 10px; }
      .corner-br { bottom: 10px; right: 10px; }
      .side-label { display: none; }
    }
  </style>
</head>
<body>
  <div class="screen-frame">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="top-dot"></span>
        <span class="top-dot"></span>
        <span class="top-dot"></span>
      </div>
      <span class="top-bar-title">• فوق بصمة •</span>
      <div class="top-bar-right">
        <span>✦</span>
        <span>معاينة حية</span>
      </div>
    </div>

    <!-- Corner decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Side label -->
    <div class="side-label">Fawq Basma • Live</div>

    <!-- Inner screen -->
    <div class="screen-inner">
      <iframe src="http://localhost:5173" title="فوق بصمة"></iframe>
    </div>
  </div>
</body>
</html>
